# Release — build the image once and deploy to lily via the shared reusable
# workflow (TheDevs-cz/ci). No more SSH-to-spare: this calls `_ship.yml`, which
# builds+pushes ghcr.io/thedevs-cz/wboost and then HMAC-POSTs
# https://deploy.lily.srv.thedevs.cz/hooks/wboost (per-app secret).
#
# The .env (DATABASE_URL, MinIO/S3, OAuth2 keys, Sentry, …) is rendered on the
# box (lily.srv) from wboost's Infisical project at deploy time — never here.
#
# Trigger: only after the `Tests` workflow succeeds on main (keeps the
# tests-must-pass gate the old SSH pipeline had).
#
# Secret (set on this repo): DEPLOY_WEBHOOK_SECRET (the per-app HMAC key). Passed
# EXPLICITLY because the reusable workflow lives under a different owner
# (secrets: inherit can't cross owners).

name: Release

on:
    workflow_run:
        workflows: [Tests]
        types:
            - completed
        branches:
            - main

permissions:
    contents: read
    packages: write

jobs:
    ship-production:
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        uses: TheDevs-cz/ci/.github/workflows/_ship.yml@v1
        secrets:
            DEPLOY_WEBHOOK_SECRET: ${{ secrets.DEPLOY_WEBHOOK_SECRET }}
        with:
            app: wboost
            image: ghcr.io/thedevs-cz/wboost
            deploy_host: lily.srv.thedevs.cz
            build_args: APP_VERSION=${{ github.event.workflow_run.head_sha }}
            await_deploy: false
